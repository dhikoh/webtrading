version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: trade-machine-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: local_secret_password
      POSTGRES_DB: trade_machine_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: trade-machine-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
